<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Voting Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #c084fc, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
        }

        .dashboard {
            width: 100%;
            max-width: 900px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out;
        }

        .total-votes {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .total-votes span {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1.5rem;
            border-radius: 999px;
            font-variant-numeric: tabular-nums;
            border: 1px solid var(--glass-border);
        }

        .candidates-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .candidate-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .candidate-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .candidate-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            position: relative;
            z-index: 2;
        }

        .candidate-name {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .candidate-votes {
            font-size: 1.5rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }

        .progress-track {
            width: 100%;
            height: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 999px;
            overflow: hidden;
            position: relative;
            z-index: 2;
        }

        .progress-bar {
            height: 100%;
            border-radius: 999px;
            width: 0%;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.3) 50%, rgba(255, 255, 255, 0) 100%);
            animation: shimmer 2s infinite;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }

        /* Color palette for bars */
        .color-0 {
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
        }

        .color-1 {
            background: linear-gradient(90deg, #8b5cf6, #c084fc);
        }

        .color-2 {
            background: linear-gradient(90deg, #ec4899, #f472b6);
        }

        .color-3 {
            background: linear-gradient(90deg, #10b981, #34d399);
        }

        .color-4 {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(0.95);
                opacity: 0.8;
            }
        }

        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }

        .loader::after {
            content: '';
            width: 40px;
            height: 40px;
            border: 4px solid var(--glass-border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Live Election Results</h1>
        <p class="subtitle"><span class="status-dot"></span> Real-time Kafka Event Stream Processing</p>
    </header>

    <div class="dashboard">
        <div class="total-votes">
            Total Votes Cast: <span id="totalCount">0</span>
        </div>
        <div class="candidates-container" id="candidatesEl">
            <div class="loader"></div>
        </div>
    </div>

    <script>
        const API_URL = '/results';
        let previousData = {};

        async function fetchResults() {
            try {
                // Attach a cache-busting timestamp so the browser NEVER returns stale cached data
                const response = await fetch(`${API_URL}?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                renderResults(data);
            } catch (error) {
                console.error('Error fetching results:', error);
            }
        }

        function renderResults(data) {
            const container = document.getElementById('candidatesEl');
            const totalCountEl = document.getElementById('totalCount');

            // Check if object is empty
            if (Object.keys(data).length === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 2rem;">No votes recorded yet. Start voting!</div>';
                totalCountEl.innerText = '0';
                return;
            }

            // Remove loader on first data fetch
            if (container.querySelector('.loader')) {
                container.innerHTML = '';
            }

            // Calculate total and find max for percentage scaling
            let totalVotes = 0;
            let maxVotes = 0;

            // Sort candidates by vote count descending
            const sortedCandidates = Object.entries(data).sort((a, b) => b[1] - a[1]);

            sortedCandidates.forEach(([name, votes]) => {
                totalVotes += votes;
                if (votes > maxVotes) maxVotes = Math.max(1, votes); // Prevent div by 0
            });

            // Animate total count
            animateValue(totalCountEl, parseInt(totalCountEl.innerText) || 0, totalVotes, 1000);

            // Keep track of existing elements to update smoothly instead of full re-render
            const existingCards = new Set(Array.from(container.children).map(c => c.dataset.candidate));

            sortedCandidates.forEach(([name, votes], index) => {
                const percentage = totalVotes === 0 ? 0 : (votes / maxVotes) * 100;
                const colorClass = `color-${index % 5}`;

                let card = document.querySelector(`[data-candidate="${name}"]`);

                if (!card) {
                    // Create new card
                    card = document.createElement('div');
                    card.className = 'candidate-card';
                    card.dataset.candidate = name;
                    card.innerHTML = `
                        <div class="candidate-info">
                            <div class="candidate-name">${name}</div>
                            <div class="candidate-votes">0</div>
                        </div>
                        <div class="progress-track">
                            <div class="progress-bar ${colorClass}" style="width: 0%"></div>
                        </div>
                    `;
                    container.appendChild(card);
                } else {
                    // Remove from existing set so we know what to delete later
                    existingCards.delete(name);

                    // Update color class in case order changed
                    const bar = card.querySelector('.progress-bar');
                    bar.className = `progress-bar ${colorClass}`;
                }

                // Update values with animation delay to allow DOM to render
                setTimeout(() => {
                    const votesEl = card.querySelector('.candidate-votes');
                    const bar = card.querySelector('.progress-bar');

                    const currentVotes = parseInt(votesEl.innerText) || 0;
                    if (currentVotes !== votes) {
                        animateValue(votesEl, currentVotes, votes, 1000);
                    }

                    bar.style.width = `${percentage}%`;
                }, 50);

                // Keep order in flex container
                card.style.order = index;
            });

            // Remove cards for candidates that no longer exist
            existingCards.forEach(name => {
                const card = document.querySelector(`[data-candidate="${name}"]`);
                if (card) card.remove();
            });
        }

        // Animate numbers smoothly
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // easeOutQuart
                const easeOut = 1 - Math.pow(1 - progress, 4);
                obj.innerHTML = Math.floor(easeOut * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.innerHTML = end;
                }
            };
            window.requestAnimationFrame(step);
        }

        // Initial fetch and polling setup
        fetchResults();
        setInterval(fetchResults, 2000); // Poll every 2 seconds
    </script>
</body>

</html>
